name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Build
        run: cargo build --all-features

      - name: Test
        run: cargo test

      - name: Test (blocking feature)
        run: cargo test --features blocking

      - name: Clippy
        run: cargo clippy --all-targets --features blocking -- -D warnings

      - name: Format check
        run: cargo fmt --check
