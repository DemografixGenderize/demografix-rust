name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify tag matches manifest version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          manifest_version="$(cargo metadata --no-deps --format-version 1 \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["packages"][0]["version"])')"
          echo "Tag version:      ${tag_version}"
          echo "Manifest version: ${manifest_version}"
          if [ "${tag_version}" != "${manifest_version}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${manifest_version}"
            exit 1
          fi

      - name: Build
        run: cargo build --all-features

      - name: Test
        run: cargo test --features blocking

      # Trusted Publishing: exchange the GitHub OIDC token for a short-lived
      # crates.io token. Fallback: set CARGO_REGISTRY_TOKEN as a repo secret and
      # replace this step plus the publish step with `cargo publish` directly.
      - name: Authenticate to crates.io (OIDC Trusted Publishing)
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  github-release:
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
