name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify tag matches manifest version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          manifest_version="$(cargo metadata --no-deps --format-version 1 \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["packages"][0]["version"])')"
          echo "Tag version:      ${tag_version}"
          echo "Manifest version: ${manifest_version}"
          if [ "${tag_version}" != "${manifest_version}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${manifest_version}"
            exit 1
          fi

      - name: Build
        run: cargo build --all-features

      - name: Test
        run: cargo test --features blocking

      # First publish of a NEW crate must use a token: crates.io trusted
      # publishing requires the crate to already exist (no pending-publisher
      # like PyPI/RubyGems). After 0.1.0 is live, set up a trusted publisher on
      # the crate settings and switch back to the OIDC rust-lang/crates-io-auth-action.
      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  github-release:
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
